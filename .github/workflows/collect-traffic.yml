name: Collect GitHub traffic

on:
  schedule:
    # GitHub exposes only a rolling 14-day window. Daily collection preserves it.
    - cron: "23 23 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: github-traffic-collection
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Collect all visible owned repositories
        env:
          GH_TOKEN: ${{ secrets.GH_TRAFFIC_TOKEN }}
          GITHUB_OWNER: ${{ github.repository_owner }}
        run: python query_github_traffic_data.py

      - name: Validate generated archive
        run: python query_github_traffic_data.py --validate

      - name: Commit archive update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/dashboard.json data/repositories
          if git diff --cached --quiet; then
            echo "No data changes"
          else
            git commit -m "chore(data): archive GitHub traffic"
            git push
          fi
